name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and Push Docker image
      run: |
        # Convert everything to lowercase for Docker compatibility
        IMAGE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME="ghcr.io/${IMAGE_OWNER}/${IMAGE_REPO}"
        IMAGE_TAG=$(date +%s)
        
        echo "Building image: ${IMAGE_NAME}:${IMAGE_TAG}"
        docker build . --file Dockerfile --tag ${IMAGE_NAME}:${IMAGE_TAG}
        
        echo "Pushing to registry..."
        docker push ${IMAGE_NAME}:${IMAGE_TAG}
        
        echo "✅ Image pushed successfully!"
        echo "📦 Pull command: docker pull ${IMAGE_NAME}:${IMAGE_TAG}"
